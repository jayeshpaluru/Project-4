name: CI/CD

on:
  push:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install and lint frontend
        working-directory: frontend
        run: |
          npm install
          npm run lint

      - name: Install, lint, and test backend
        working-directory: backend
        env:
          MONGODB_URI: ${{ secrets.MONGODB_URI }}
        run: |
          npm install
          npm run lint
          node webServer.js &
          sleep 5
          cd test
          npm install
          npm test